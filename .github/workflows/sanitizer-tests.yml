name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'source/smd_parser.cpp'
      - 'include/smd_parser.hpp'
  pull_request:
    branches:
      - main
    paths:
      - 'source/smd_parser.cpp'
      - 'include/smd_parser.hpp'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86-64: release build, no sanitizers. Quick smoke test.
          - name: x86_64 / Release
            slug: x86_64-release
            runner: ubuntu-24.04
            sanitize: "OFF"
            debug_history: "OFF"

          # x86-64: ASan + UBSan
          - name: x86_64 / ASan+UBSan
            slug: x86_64-asan-ubsan
            runner: ubuntu-24.04
            sanitize: "ON"
            debug_history: "OFF"

          # x86-64: ASan + UBSan + DEBUG so HistoryUpdate/HistoryClean are
          # exposed and exercised. Catches issues in code paths that only
          # exist when DEBUG is defined.
          - name: x86_64 / ASan+UBSan + DEBUG
            slug: x86_64-asan-ubsan-debug
            runner: ubuntu-24.04
            sanitize: "ON"
            debug_history: "ON"

          # arm64 native: release build. Validates arm64 codegen
          # (alignment, signed-overflow on arm64, etc.) which matters
          # because the parser will run on a Nintendo Switch (aarch64).
          - name: arm64 / Release
            slug: arm64-release
            runner: ubuntu-24.04-arm
            sanitize: "OFF"
            debug_history: "OFF"

          # arm64 native: ASan + UBSan. Closest to the Switch's actual
          # architecture with full sanitizer coverage.
          - name: arm64 / ASan+UBSan
            slug: arm64-asan-ubsan
            runner: ubuntu-24.04-arm
            sanitize: "ON"
            debug_history: "OFF"

          # arm64 native: ASan + UBSan + DEBUG
          - name: arm64 / ASan+UBSan + DEBUG
            slug: arm64-asan-ubsan-debug
            runner: ubuntu-24.04-arm
            sanitize: "ON"
            debug_history: "ON"

    steps:
      - uses: actions/checkout@v6

      # GCC 15 isn't in Ubuntu 24.04's default repos yet, so pull it from
      # the ubuntu-toolchain-r/test PPA. Matches devkitPro's compiler
      # generation (GCC 15 with C++23 support).
      - name: Install GCC 15 + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-15 g++-15 cmake ninja-build
          echo "CC=gcc-15"  >> $GITHUB_ENV
          echo "CXX=g++-15" >> $GITHUB_ENV

      - name: Show toolchain info
        run: |
          uname -a
          gcc-15 --version | head -1
          g++-15 --version | head -1
          cmake --version | head -1

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_CXX_COMPILER=g++-15 \
            -DSMD_SANITIZE=${{ matrix.sanitize }} \
            -DSMD_DEBUG_HISTORY=${{ matrix.debug_history }}

      - name: Build
        run: cmake --build build -j

      # Capture every test's stdout/stderr. CTest's default behaviour
      # discards passing-test output -- we override that so the upload
      # step always has something to publish.
      - name: Run tests
        working-directory: build
        run: |
          mkdir -p test-logs
          ctest \
            --output-on-failure \
            --no-tests=error \
            --output-junit test-logs/junit.xml \
            --output-log test-logs/ctest.log \
            --test-output-size-passed 0 \
            --test-output-size-failed 0

      # Always upload logs (success OR failure) so we can see test
      # output without re-running the job.
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.slug }}
          path: |
            build/test-logs/
            build/Testing/Temporary/
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: warn
          retention-days: 14
