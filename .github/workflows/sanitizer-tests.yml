# .github/workflows/sanitizer-tests.yml
#
# Builds and runs the smd_parser unit-test suite on a native ARM64 runner
# under both AddressSanitizer (ASan) and UndefinedBehaviourSanitizer (UBSan).
#
# Key compilation notes:
#   • tinyexpr.c must be compiled as C (clang -x c), not C++, due to its use
#     of void* arithmetic and implicit casts that are illegal in C++ mode.
#   • smd_parser.cpp and the test driver are compiled as C++23 by clang++.
#   • tests/stub/switch.h provides libnx type aliases + crc32Calculate() so
#     neither DevkitPro nor libnx are required on the host.
#
# Jobs:
#   asan   — AddressSanitizer + LeakSanitizer
#   ubsan  — UndefinedBehaviourSanitizer + integer / nullability checkers

name: Sanitizer Tests (ARM64)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # C++ sources (compiled with clang++)
  CXX_SRCS: source/smd_parser.cpp tests/test_parser.cpp

  # Include paths – tests/stub/ must come first so it shadows <switch.h>
  INCS: >-
    -I tests/stub
    -I include
    -I include/Ext
    -I lib/tinyexpr
    -I lib/Atmosphere-libs/libstratosphere/source/dmnt
    -I lib/Atmosphere-libs/libstratosphere/source
    -I lib/libtesla/include

  DEFINES: >-
    -D__SWITCH__
    -DAPP_VERSION='"test"'
    -DAPP_TITLE='"SMD Parser Test"'

  # Flags shared across both builds
  COMMON_CXXFLAGS: >-
    -std=c++23
    -g
    -O1
    -fno-omit-frame-pointer
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Wno-unknown-pragmas

jobs:
  # ---------------------------------------------------------------------------
  # AddressSanitizer + LeakSanitizer
  # ---------------------------------------------------------------------------
  asan:
    name: ASan (ARM64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang

      - name: Compile tinyexpr as C
        run: |
          clang -x c -std=c11 \
            -g -O1 -fno-omit-frame-pointer \
            -fsanitize=address,leak \
            ${{ env.INCS }} ${{ env.DEFINES }} \
            -c lib/tinyexpr/tinyexpr.c \
            -o tinyexpr.o

      - name: Compile and link (ASan)
        run: |
          clang++ ${{ env.COMMON_CXXFLAGS }} \
            -fsanitize=address,leak \
            ${{ env.INCS }} ${{ env.DEFINES }} \
            ${{ env.CXX_SRCS }} \
            tinyexpr.o \
            -o test_asan \
            -lm

      - name: Run tests (ASan)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:check_initialization_order=1:strict_init_order=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp
        run: ./test_asan modes

      - name: Upload binary on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asan-binary
          path: test_asan

  # ---------------------------------------------------------------------------
  # UndefinedBehaviourSanitizer
  # ---------------------------------------------------------------------------
  ubsan:
    name: UBSan (ARM64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang

      - name: Compile tinyexpr as C
        run: |
          clang -x c -std=c11 \
            -g -O1 -fno-omit-frame-pointer \
            -fsanitize=undefined,integer,nullability \
            -fno-sanitize-recover=all \
            ${{ env.INCS }} ${{ env.DEFINES }} \
            -c lib/tinyexpr/tinyexpr.c \
            -o tinyexpr.o

      - name: Compile and link (UBSan)
        run: |
          clang++ ${{ env.COMMON_CXXFLAGS }} \
            -fsanitize=undefined,integer,nullability \
            -fno-sanitize-recover=all \
            ${{ env.INCS }} ${{ env.DEFINES }} \
            ${{ env.CXX_SRCS }} \
            tinyexpr.o \
            -o test_ubsan \
            -lm

      - name: Run tests (UBSan)
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ./test_ubsan modes

      - name: Upload binary on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ubsan-binary
          path: test_ubsan

  # ---------------------------------------------------------------------------
  # Gate – both jobs must pass
  # ---------------------------------------------------------------------------
  all-sanitizers-pass:
    name: All sanitizer jobs passed
    needs: [asan, ubsan]
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.asan.result }}" != "success" ] || \
             [ "${{ needs.ubsan.result }}" != "success" ]; then
            echo "One or more sanitizer jobs failed."
            exit 1
          fi
          echo "All sanitizer jobs passed."
